<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyAccount BI Dashboard — V2 Prototype</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.10.3/Recharts.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/umd/lucide.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;
    const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, LineChart, Line, PieChart, Pie, Cell } = Recharts;

    const products = ['All Products', 'Adaware', 'GameBuff', 'InPixio', 'CleanBuff'];
    const periods = ['Monthly', 'Weekly', 'Daily'];

    const kpiData = {
      'All Products': { engagement: 14.0, activeUsers: 3480, newAccounts: 165, multiPage: 42.3, loginsPerUser: 1.8, totalHolders: 24857 },
      'Adaware': { engagement: 12.8, activeUsers: 1240, newAccounts: 52, multiPage: 38.5, loginsPerUser: 1.6, totalHolders: 9688 },
      'GameBuff': { engagement: 18.2, activeUsers: 980, newAccounts: 48, multiPage: 51.2, loginsPerUser: 2.1, totalHolders: 5385 },
      'InPixio': { engagement: 11.5, activeUsers: 720, newAccounts: 38, multiPage: 35.8, loginsPerUser: 1.5, totalHolders: 6261 },
      'CleanBuff': { engagement: 15.3, activeUsers: 540, newAccounts: 27, multiPage: 44.1, loginsPerUser: 1.9, totalHolders: 3523 }
    };

    const pageData = [
      { page: 'Home', views: 4820, visitors: 2610, engagement: 75.0 },
      { page: 'Manage Products', views: 2890, visitors: 1740, engagement: 50.0 },
      { page: 'Subscriptions', views: 2410, visitors: 1392, engagement: 40.0 },
      { page: 'Payment Info', views: 1650, visitors: 1044, engagement: 30.0 },
      { page: 'Manage Account', views: 1240, visitors: 870, engagement: 25.0 },
      { page: 'Security', views: 680, visitors: 522, engagement: 15.0 }
    ];

    const trendData = [
      { month: 'Sep', engagement: 11.2, users: 2780 },
      { month: 'Oct', engagement: 12.1, users: 3010 },
      { month: 'Nov', engagement: 12.8, users: 3180 },
      { month: 'Dec', engagement: 13.2, users: 3290 },
      { month: 'Jan', engagement: 13.8, users: 3410 },
      { month: 'Feb', engagement: 14.0, users: 3480 }
    ];

    const attributionData = [
      { product: 'Adaware', sessions: 1580, multiProduct: 185, topPage: 'Subscriptions' },
      { product: 'GameBuff', sessions: 1240, multiProduct: 210, topPage: 'Manage Products' },
      { product: 'InPixio', sessions: 920, multiProduct: 95, topPage: 'Home' },
      { product: 'CleanBuff', sessions: 680, multiProduct: 72, topPage: 'Payment Info' }
    ];

    const funnelData = [
      { name: 'Page Visits', value: 3480, fill: '#3b82f6' },
      { name: 'CTA Impressions', value: 1856, fill: '#60a5fa' },
      { name: 'CTA Clicks', value: 312, fill: '#93c5fd' },
      { name: 'Purchases', value: 42, fill: '#22c55e' }
    ];

    const conversionByPage = [
      { page: 'Subscriptions', rate: 2.8, clicks: 145, conversions: 18 },
      { page: 'Manage Products', rate: 1.9, clicks: 98, conversions: 12 },
      { page: 'Payment Info', rate: 1.4, clicks: 52, conversions: 8 },
      { page: 'Home', rate: 0.6, clicks: 17, conversions: 4 }
    ];

    const trafficSourceData = [
      { source: 'Email Campaign', sessions: 1420, clicks: 142, conversions: 22, revenue: 892, rate: 15.5 },
      { source: 'Desktop Notif', sessions: 980, clicks: 88, conversions: 11, revenue: 445, rate: 12.5 },
      { source: 'Web App', sessions: 720, clicks: 58, conversions: 6, revenue: 398, rate: 10.3 },
      { source: 'Organic', sessions: 360, clicks: 24, conversions: 3, revenue: 230, rate: 12.5 }
    ];

    const revenueByProduct = [
      { name: 'Adaware', value: 685, upsell: 420, crossSell: 265 },
      { name: 'GameBuff', value: 520, upsell: 285, crossSell: 235 },
      { name: 'InPixio', value: 445, upsell: 310, crossSell: 135 },
      { name: 'CleanBuff', value: 315, upsell: 195, crossSell: 120 }
    ];

    const COLORS = ['#3b82f6', '#22c55e', '#f59e0b', '#ef4444', '#8b5cf6'];

    const TrendUp = () => (
      <svg className="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
      </svg>
    );

    const TrendDown = () => (
      <svg className="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 17h8m0 0v-8m0 8l-8-8-4 4-6-6" />
      </svg>
    );

    const AlertIcon = () => (
      <svg className="w-5 h-5 text-amber-600 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
    );

    const KPICard = ({ title, value, subtitle, trend }) => (
      <div className="bg-white rounded-lg p-4 shadow-sm border">
        <div className="text-sm text-gray-500 mb-2">{title}</div>
        <div className="text-2xl font-bold text-gray-900">{value}</div>
        {subtitle && <div className="text-xs text-gray-500 mt-1">{subtitle}</div>}
        {trend && (
          <div className={`flex items-center text-xs mt-1 ${trend > 0 ? 'text-green-600' : 'text-red-600'}`}>
            {trend > 0 ? <TrendUp /> : <TrendDown />}
            {Math.abs(trend)}% vs last month
          </div>
        )}
      </div>
    );

    function Dashboard() {
      const [activeTab, setActiveTab] = useState('overview');
      const [product, setProduct] = useState('All Products');
      const [period, setPeriod] = useState('Monthly');
      const data = kpiData[product];

      const tabs = [
        { id: 'overview', label: 'Overview' },
        { id: 'pages', label: 'Page Navigation' },
        { id: 'attribution', label: 'User Attribution' },
        { id: 'conversions', label: 'Conversions', badge: 'NEW' }
      ];

      return (
        <div className="min-h-screen bg-gray-50 p-6">
          <div className="max-w-7xl mx-auto">
            <div className="mb-6">
              <h1 className="text-2xl font-bold text-gray-900">MyAccount BI Dashboard</h1>
              <p className="text-sm text-gray-500">V2 Prototype — Feb 2026</p>
            </div>

            <div className="flex gap-1 mb-6 bg-gray-100 p-1 rounded-lg w-fit">
              {tabs.map(tab => (
                <button
                  key={tab.id}
                  onClick={() => setActiveTab(tab.id)}
                  className={`px-4 py-2 rounded-md text-sm font-medium transition-colors flex items-center gap-2 ${
                    activeTab === tab.id ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-600 hover:text-gray-900'
                  }`}
                >
                  {tab.label}
                  {tab.badge && (
                    <span className="bg-amber-400 text-amber-900 text-xs px-1.5 py-0.5 rounded font-semibold">{tab.badge}</span>
                  )}
                </button>
              ))}
            </div>

            <div className="flex gap-4 mb-6">
              <select value={product} onChange={e => setProduct(e.target.value)} className="px-3 py-2 border rounded-lg bg-white text-sm">
                {products.map(p => <option key={p}>{p}</option>)}
              </select>
              <select value={period} onChange={e => setPeriod(e.target.value)} className="px-3 py-2 border rounded-lg bg-white text-sm">
                {periods.map(p => <option key={p}>{p}</option>)}
              </select>
            </div>

            {activeTab === 'overview' && (
              <div className="space-y-6">
                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                  <KPICard title="Portal Engagement" value={`${data.engagement}%`} subtitle={`of ${data.totalHolders.toLocaleString()} holders`} trend={1.5} />
                  <KPICard title="Active Users" value={data.activeUsers.toLocaleString()} subtitle="this month" trend={2.1} />
                  <KPICard title="New Accounts" value={data.newAccounts} subtitle="this month" trend={-3.2} />
                  <KPICard title="Multi-Page Rate" value={`${data.multiPage}%`} subtitle="2+ pages visited" trend={4.8} />
                  <KPICard title="Logins/User" value={data.loginsPerUser} subtitle="avg this month" />
                  <KPICard title="Top Page" value="Home" subtitle="75% engagement" />
                </div>
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                  <div className="bg-white rounded-lg p-4 shadow-sm border">
                    <h3 className="font-semibold mb-4">Portal Engagement Trend</h3>
                    <ResponsiveContainer width="100%" height={250}>
                      <LineChart data={trendData}>
                        <XAxis dataKey="month" fontSize={12} />
                        <YAxis fontSize={12} domain={[0, 20]} tickFormatter={v => `${v}%`} />
                        <Tooltip formatter={v => `${v}%`} />
                        <Line type="monotone" dataKey="engagement" stroke="#3b82f6" strokeWidth={2} dot={{ r: 4 }} />
                      </LineChart>
                    </ResponsiveContainer>
                  </div>
                  <div className="bg-white rounded-lg p-4 shadow-sm border">
                    <h3 className="font-semibold mb-4">Page Engagement Rate</h3>
                    <ResponsiveContainer width="100%" height={250}>
                      <BarChart data={pageData} layout="vertical">
                        <XAxis type="number" fontSize={12} domain={[0, 100]} tickFormatter={v => `${v}%`} />
                        <YAxis type="category" dataKey="page" fontSize={12} width={100} />
                        <Tooltip formatter={v => `${v}%`} />
                        <Bar dataKey="engagement" fill="#3b82f6" radius={[0, 4, 4, 0]} />
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                </div>
              </div>
            )}

            {activeTab === 'pages' && (
              <div className="space-y-6">
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                  <KPICard title="Total Page Views" value="13,690" subtitle="this month" />
                  <KPICard title="Unique Visitors" value="3,480" subtitle="distinct users" />
                  <KPICard title="Avg Pages/Session" value="2.4" subtitle="pages viewed" />
                  <KPICard title="Most Visited" value="Home" subtitle="4,820 views" />
                </div>
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                  <div className="bg-white rounded-lg p-4 shadow-sm border">
                    <h3 className="font-semibold mb-4">Page Views by Page</h3>
                    <ResponsiveContainer width="100%" height={280}>
                      <BarChart data={pageData} layout="vertical">
                        <XAxis type="number" fontSize={12} />
                        <YAxis type="category" dataKey="page" fontSize={12} width={100} />
                        <Tooltip />
                        <Bar dataKey="views" fill="#3b82f6" radius={[0, 4, 4, 0]} />
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                  <div className="bg-white rounded-lg p-4 shadow-sm border">
                    <h3 className="font-semibold mb-4">Unique Visitors by Page</h3>
                    <ResponsiveContainer width="100%" height={280}>
                      <BarChart data={pageData} layout="vertical">
                        <XAxis type="number" fontSize={12} />
                        <YAxis type="category" dataKey="page" fontSize={12} width={100} />
                        <Tooltip />
                        <Bar dataKey="visitors" fill="#22c55e" radius={[0, 4, 4, 0]} />
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                </div>
              </div>
            )}

            {activeTab === 'attribution' && (
              <div className="space-y-6">
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                  <KPICard title="Multi-Product Users" value="562" subtitle="own 2+ products" />
                  <KPICard title="Multi-Product Rate" value="16.2%" subtitle="of all visitors" />
                  <KPICard title="Top Referrer" value="Adaware" subtitle="1,580 sessions" />
                  <KPICard title="Total Sessions" value="4,420" subtitle="this month" />
                </div>
                <div className="bg-white rounded-lg p-4 shadow-sm border">
                  <h3 className="font-semibold mb-4">Sessions by Referrer Product</h3>
                  <ResponsiveContainer width="100%" height={280}>
                    <BarChart data={attributionData}>
                      <XAxis dataKey="product" fontSize={12} />
                      <YAxis fontSize={12} />
                      <Tooltip />
                      <Bar dataKey="sessions" fill="#3b82f6" radius={[4, 4, 0, 0]} />
                    </BarChart>
                  </ResponsiveContainer>
                </div>
                <div className="bg-white rounded-lg p-4 shadow-sm border overflow-x-auto">
                  <h3 className="font-semibold mb-4">Attribution Detail</h3>
                  <table className="w-full text-sm">
                    <thead>
                      <tr className="border-b">
                        <th className="text-left py-2 px-3">Product</th>
                        <th className="text-right py-2 px-3">Sessions</th>
                        <th className="text-right py-2 px-3">Multi-Product Users</th>
                        <th className="text-left py-2 px-3">Top Page</th>
                      </tr>
                    </thead>
                    <tbody>
                      {attributionData.map(row => (
                        <tr key={row.product} className="border-b last:border-0">
                          <td className="py-2 px-3 font-medium">{row.product}</td>
                          <td className="py-2 px-3 text-right">{row.sessions.toLocaleString()}</td>
                          <td className="py-2 px-3 text-right">{row.multiProduct}</td>
                          <td className="py-2 px-3">{row.topPage}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {activeTab === 'conversions' && (
              <div className="space-y-6">
                <div className="bg-amber-50 border border-amber-200 rounded-lg p-4 flex items-start gap-3">
                  <AlertIcon />
                  <div>
                    <p className="font-medium text-amber-800">Tracking Events Required</p>
                    <p className="text-sm text-amber-700 mt-1">
                      This tab shows placeholder data. To display real conversions, the tracking team needs to implement: 
                      <code className="bg-amber-100 px-1 rounded mx-1">cta_impression</code>,
                      <code className="bg-amber-100 px-1 rounded mx-1">cta_click</code>,
                      <code className="bg-amber-100 px-1 rounded mx-1">purchase_complete</code>, and
                      <code className="bg-amber-100 px-1 rounded mx-1">traffic_source</code> events.
                    </p>
                  </div>
                </div>

                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                  <KPICard title="Conversion Rate" value="13.5%" subtitle="clicks → purchase" trend={2.3} />
                  <KPICard title="Revenue Influenced" value="$1,965" subtitle="this month" trend={8.4} />
                  <KPICard title="Upsells" value="28" subtitle="completed" />
                  <KPICard title="Cross-Sells" value="14" subtitle="completed" />
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                  <div className="bg-white rounded-lg p-4 shadow-sm border">
                    <h3 className="font-semibold mb-4">Conversion Funnel</h3>
                    <div className="space-y-3">
                      {funnelData.map((item, i) => {
                        const pct = (item.value / funnelData[0].value) * 100;
                        const dropoff = i > 0 ? ((funnelData[i-1].value - item.value) / funnelData[i-1].value * 100).toFixed(1) : null;
                        return (
                          <div key={item.name}>
                            <div className="flex justify-between text-sm mb-1">
                              <span>{item.name}</span>
                              <span className="font-medium">{item.value.toLocaleString()}</span>
                            </div>
                            <div className="h-8 bg-gray-100 rounded overflow-hidden relative">
                              <div className="h-full rounded" style={{ width: `${pct}%`, backgroundColor: item.fill }} />
                              {dropoff && (
                                <span className="absolute right-2 top-1/2 -translate-y-1/2 text-xs text-gray-500">
                                  -{dropoff}% dropoff
                                </span>
                              )}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  <div className="bg-white rounded-lg p-4 shadow-sm border">
                    <h3 className="font-semibold mb-4">Conversion Rate by Page</h3>
                    <ResponsiveContainer width="100%" height={220}>
                      <BarChart data={conversionByPage} layout="vertical">
                        <XAxis type="number" fontSize={12} domain={[0, 4]} tickFormatter={v => `${v}%`} />
                        <YAxis type="category" dataKey="page" fontSize={12} width={100} />
                        <Tooltip formatter={v => `${v}%`} />
                        <Bar dataKey="rate" fill="#22c55e" radius={[0, 4, 4, 0]} />
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                </div>

                <div className="bg-white rounded-lg p-4 shadow-sm border">
                  <h3 className="font-semibold mb-4">Conversions by Traffic Source</h3>
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div className="lg:col-span-1">
                      <ResponsiveContainer width="100%" height={200}>
                        <PieChart>
                          <Pie data={trafficSourceData} dataKey="conversions" nameKey="source" cx="50%" cy="50%" outerRadius={70} label={({ percent }) => `${(percent * 100).toFixed(0)}%`}>
                            {trafficSourceData.map((_, i) => <Cell key={i} fill={COLORS[i % COLORS.length]} />)}
                          </Pie>
                          <Tooltip />
                        </PieChart>
                      </ResponsiveContainer>
                    </div>
                    <div className="lg:col-span-2 overflow-x-auto">
                      <table className="w-full text-sm">
                        <thead>
                          <tr className="border-b">
                            <th className="text-left py-2 px-3">Source</th>
                            <th className="text-right py-2 px-3">Sessions</th>
                            <th className="text-right py-2 px-3">CTA Clicks</th>
                            <th className="text-right py-2 px-3">Conversions</th>
                            <th className="text-right py-2 px-3">Conv. Rate</th>
                            <th className="text-right py-2 px-3">Revenue</th>
                          </tr>
                        </thead>
                        <tbody>
                          {trafficSourceData.map((row, i) => (
                            <tr key={row.source} className="border-b last:border-0">
                              <td className="py-2 px-3 font-medium flex items-center gap-2">
                                <span className="w-3 h-3 rounded-full inline-block" style={{ backgroundColor: COLORS[i] }}></span>
                                {row.source}
                              </td>
                              <td className="py-2 px-3 text-right">{row.sessions.toLocaleString()}</td>
                              <td className="py-2 px-3 text-right">{row.clicks}</td>
                              <td className="py-2 px-3 text-right">{row.conversions}</td>
                              <td className="py-2 px-3 text-right">{row.rate}%</td>
                              <td className="py-2 px-3 text-right">${row.revenue}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

                <div className="bg-white rounded-lg p-4 shadow-sm border">
                  <h3 className="font-semibold mb-4">Revenue by Product</h3>
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div className="lg:col-span-1">
                      <ResponsiveContainer width="100%" height={200}>
                        <PieChart>
                          <Pie data={revenueByProduct} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={70}>
                            {revenueByProduct.map((_, i) => <Cell key={i} fill={COLORS[i % COLORS.length]} />)}
                          </Pie>
                          <Tooltip formatter={v => `$${v}`} />
                        </PieChart>
                      </ResponsiveContainer>
                    </div>
                    <div className="lg:col-span-2 overflow-x-auto">
                      <table className="w-full text-sm">
                        <thead>
                          <tr className="border-b">
                            <th className="text-left py-2 px-3">Product</th>
                            <th className="text-right py-2 px-3">Total Revenue</th>
                            <th className="text-right py-2 px-3">Upsells</th>
                            <th className="text-right py-2 px-3">Cross-Sells</th>
                          </tr>
                        </thead>
                        <tbody>
                          {revenueByProduct.map((row, i) => (
                            <tr key={row.name} className="border-b last:border-0">
                              <td className="py-2 px-3 font-medium flex items-center gap-2">
                                <span className="w-3 h-3 rounded-full inline-block" style={{ backgroundColor: COLORS[i] }}></span>
                                {row.name}
                              </td>
                              <td className="py-2 px-3 text-right font-medium">${row.value}</td>
                              <td className="py-2 px-3 text-right text-green-600">${row.upsell}</td>
                              <td className="py-2 px-3 text-right text-blue-600">${row.crossSell}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.render(<Dashboard />, document.getElementById('root'));
  </script>
</body>
</html>
