<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyAccount BI Dashboard — V1 Prototype</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/recharts@2.10.0/dist/Recharts.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;
    const {
      BarChart,
      Bar,
      LineChart,
      Line,
      XAxis,
      YAxis,
      CartesianGrid,
      Tooltip,
      Legend,
      ResponsiveContainer,
      PieChart,
      Pie,
      Cell,
    } = window.Recharts;

    // ── Color palette ──
    const COLORS = {
      primary: "#1B3A5C",
      accent: "#2E75B6",
      success: "#27AE60",
      warning: "#F39C12",
      danger: "#E74C3C",
      light: "#F8F9FA",
      border: "#E2E8F0",
      text: "#334155",
      muted: "#94A3B8",
      white: "#FFFFFF",
    };

    const PRODUCT_COLORS = {
      "All Products": "#2E75B6",
      Adaware: "#E74C3C",
      GameBuff: "#9B59B6",
      InPixio: "#2ECC71",
      CleanBuff: "#3498DB",
      "PDF Suite": "#F39C12",
      "Soda PDF": "#E67E22",
    };

    const PRODUCTS = ["All Products", "Adaware", "GameBuff", "InPixio", "CleanBuff", "PDF Suite", "Soda PDF"];

    const PAGES = [
      { key: "home", label: "Home", etype: "account-home" },
      { key: "products", label: "Manage Products", etype: "account-product" },
      { key: "subscriptions", label: "Subscriptions", etype: "account-subscription" },
      { key: "billing", label: "Payment Info", etype: "account-billing" },
      { key: "account", label: "Manage Account", etype: "account-home" },
      { key: "security", label: "Security & Privacy", etype: "account-security" },
    ];

    // ── Mock data generators ──
    const generateTrendData = (product) => {
      const months = ["Sep", "Oct", "Nov", "Dec", "Jan", "Feb"];
      const base = product === "All Products" ? 1 : 0.25;
      return months.map((m, i) => ({
        month: m,
        adoptionRate: Math.round((12 + i * 3.5) * base + Math.random() * 5),
        users: Math.round((850 + i * 220) * base + Math.random() * 100),
        logins: Math.round((1200 + i * 350) * base + Math.random() * 200),
      }));
    };

    const generatePageViewData = (product) => {
      const mult = product === "All Products" ? 1 : 0.3 + Math.random() * 0.2;
      return PAGES.map((p) => ({
        page: p.label,
        views: Math.round((800 + Math.random() * 3200) * mult),
        uniqueVisitors: Math.round((400 + Math.random() * 1800) * mult),
      }));
    };

    const generatePageTrendData = (product) => {
      const months = ["Sep", "Oct", "Nov", "Dec", "Jan", "Feb"];
      const mult = product === "All Products" ? 1 : 0.3;
      return months.map((m, i) => ({
        month: m,
        Home: Math.round((600 + i * 80 + Math.random() * 150) * mult),
        "Manage Products": Math.round((400 + i * 65 + Math.random() * 100) * mult),
        Subscriptions: Math.round((350 + i * 55 + Math.random() * 90) * mult),
        "Payment Info": Math.round((200 + i * 30 + Math.random() * 60) * mult),
        "Manage Account": Math.round((180 + i * 25 + Math.random() * 50) * mult),
        "Security & Privacy": Math.round((120 + i * 20 + Math.random() * 40) * mult),
      }));
    };

    const generateReferrerData = () => [
      { product: "Adaware", sessions: 2840, home: 1200, products: 680, subscriptions: 520, billing: 240, account: 120, security: 80 },
      { product: "GameBuff", sessions: 1920, home: 900, products: 420, subscriptions: 310, billing: 150, account: 90, security: 50 },
      { product: "InPixio", sessions: 1560, home: 720, products: 380, subscriptions: 250, billing: 110, account: 60, security: 40 },
      { product: "CleanBuff", sessions: 980, home: 450, products: 240, subscriptions: 160, billing: 70, account: 40, security: 20 },
      { product: "Soda PDF", sessions: 640, home: 280, products: 160, subscriptions: 110, billing: 50, account: 25, security: 15 },
      { product: "PDF Suite", sessions: 320, home: 140, products: 80, subscriptions: 55, billing: 25, account: 12, security: 8 },
    ];

    const generateAttributionTable = () => [
      { userId: "usr_28401", products: "Adaware, Soda PDF", referrer: "Adaware", pages: "Home, Products, Subscriptions", date: "2026-02-24" },
      { userId: "usr_15903", products: "GameBuff", referrer: "GameBuff", pages: "Home, Security & Privacy", date: "2026-02-24" },
      { userId: "usr_09821", products: "InPixio, CleanBuff, Soda PDF", referrer: "Soda PDF", pages: "Home, Payment Info", date: "2026-02-23" },
      { userId: "usr_44210", products: "Adaware", referrer: "Adaware", pages: "Home, Products", date: "2026-02-23" },
      { userId: "usr_33107", products: "GameBuff, Adaware", referrer: "GameBuff", pages: "Home, Products, Account", date: "2026-02-22" },
      { userId: "usr_77562", products: "CleanBuff", referrer: "CleanBuff", pages: "Home, Subscriptions, Billing", date: "2026-02-22" },
      { userId: "usr_61045", products: "Soda PDF", referrer: "Soda PDF", pages: "Home, Products, Subscriptions", date: "2026-02-21" },
      { userId: "usr_88293", products: "InPixio, PDF Suite", referrer: "InPixio", pages: "Home, Account, Security", date: "2026-02-21" },
    ];

    const multiProductData = [
      { name: "Single Product", value: 4820, color: "#94A3B8" },
      { name: "2 Products", value: 1640, color: "#2E75B6" },
      { name: "3+ Products", value: 580, color: "#1B3A5C" },
    ];

    // ── Components ──
    function KPITile({ label, value, subvalue, trend, color = COLORS.accent }) {
      const isUp = trend >= 0;
      return (
        <div style={{
          background: COLORS.white,
          borderRadius: 10,
          padding: "20px 22px",
          border: `1px solid ${COLORS.border}`,
          flex: "1 1 0",
          minWidth: 160,
        }}>
          <div style={{ fontSize: 12, color: COLORS.muted, fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5 }}>{label}</div>
          <div style={{ fontSize: 28, fontWeight: 700, color: COLORS.primary, marginTop: 6 }}>{value}</div>
          <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 6 }}>
            {trend !== undefined && (
              <span style={{
                fontSize: 12,
                fontWeight: 600,
                color: isUp ? COLORS.success : COLORS.danger,
                background: isUp ? "#ECFDF5" : "#FEF2F2",
                padding: "2px 8px",
                borderRadius: 12,
              }}>
                {isUp ? "+" : ""}{trend}%
              </span>
            )}
            {subvalue && <span style={{ fontSize: 12, color: COLORS.muted }}>{subvalue}</span>}
          </div>
        </div>
      );
    }

    function SectionHeader({ title, subtitle }) {
      return (
        <div style={{ marginBottom: 16, marginTop: 32 }}>
          <h2 style={{ fontSize: 18, fontWeight: 700, color: COLORS.primary, margin: 0 }}>{title}</h2>
          {subtitle && <p style={{ fontSize: 13, color: COLORS.muted, margin: "4px 0 0" }}>{subtitle}</p>}
        </div>
      );
    }

    function TabBar({ tabs, active, onChange }) {
      return (
        <div style={{ display: "flex", gap: 0, borderBottom: `2px solid ${COLORS.border}`, marginBottom: 24 }}>
          {tabs.map((t) => (
            <button
              key={t}
              onClick={() => onChange(t)}
              style={{
                padding: "10px 20px",
                border: "none",
                borderBottom: active === t ? `2px solid ${COLORS.accent}` : "2px solid transparent",
                background: "none",
                color: active === t ? COLORS.accent : COLORS.muted,
                fontWeight: active === t ? 700 : 500,
                fontSize: 14,
                cursor: "pointer",
                marginBottom: -2,
                transition: "all 0.15s",
              }}
            >
              {t}
            </button>
          ))}
        </div>
      );
    }

    function Card({ children, style = {} }) {
      return (
        <div style={{
          background: COLORS.white,
          borderRadius: 10,
          border: `1px solid ${COLORS.border}`,
          padding: 20,
          ...style,
        }}>
          {children}
        </div>
      );
    }

    // ── Main Dashboard ──
    function Dashboard() {
      const [selectedProduct, setSelectedProduct] = useState("All Products");
      const [activeTab, setActiveTab] = useState("Overview");

      const trendData = useMemo(() => generateTrendData(selectedProduct), [selectedProduct]);
      const pageViewData = useMemo(() => generatePageViewData(selectedProduct), [selectedProduct]);
      const pageTrendData = useMemo(() => generatePageTrendData(selectedProduct), [selectedProduct]);
      const referrerData = useMemo(() => generateReferrerData(), []);
      const attrTable = useMemo(() => generateAttributionTable(), []);

      const mult = selectedProduct === "All Products" ? 1 : 0.22 + Math.random() * 0.1;
      const totalUsers = Math.round(7040 * mult);
      const newAccounts = Math.round(1280 * mult);
      const logins = Math.round(12400 * mult);
      const adoptionPct = selectedProduct === "All Products" ? 28.4 : (15 + Math.random() * 20).toFixed(1);
      const loginRate = selectedProduct === "All Products" ? 72.1 : (55 + Math.random() * 25).toFixed(1);
      const loginsPerUser = selectedProduct === "All Products" ? 1.76 : (1.2 + Math.random() * 0.8).toFixed(2);
      const totalPageViews = pageViewData.reduce((s, d) => s + d.views, 0);
      const avgPagesPerSession = (totalPageViews / (logins || 1)).toFixed(1);
      const mostVisitedPage = pageViewData.sort((a, b) => b.views - a.views)[0]?.page || "Home";

      return (
        <div style={{ background: "#F1F5F9", minHeight: "100vh", fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" }}>
          {/* Header */}
          <div style={{
            background: COLORS.primary,
            padding: "20px 32px",
            display: "flex",
            alignItems: "center",
            justifyContent: "space-between",
          }}>
            <div>
              <h1 style={{ color: COLORS.white, fontSize: 22, fontWeight: 700, margin: 0 }}>MyAccount BI Dashboard</h1>
              <span style={{ color: "#94A3B8", fontSize: 13 }}>V1 Prototype — Adoption, Page Navigation & User Attribution</span>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <span style={{ color: "#94A3B8", fontSize: 12, fontWeight: 600 }}>PRODUCT:</span>
              <select
                value={selectedProduct}
                onChange={(e) => setSelectedProduct(e.target.value)}
                style={{
                  padding: "8px 14px",
                  borderRadius: 8,
                  border: "1px solid #475569",
                  background: "#1E293B",
                  color: COLORS.white,
                  fontSize: 14,
                  fontWeight: 600,
                  cursor: "pointer",
                  minWidth: 160,
                }}
              >
                {PRODUCTS.map((p) => (
                  <option key={p} value={p}>{p}</option>
                ))}
              </select>
              <div style={{
                background: "#1E293B",
                padding: "8px 14px",
                borderRadius: 8,
                border: "1px solid #475569",
                color: "#94A3B8",
                fontSize: 13,
              }}>
                Last 90 days
              </div>
            </div>
          </div>

          {/* Tab Navigation */}
          <div style={{ padding: "0 32px", background: COLORS.white, borderBottom: `1px solid ${COLORS.border}` }}>
            <TabBar
              tabs={["Overview", "Page Navigation", "User Attribution"]}
              active={activeTab}
              onChange={setActiveTab}
            />
          </div>

          {/* Content */}
          <div style={{ padding: "24px 32px", maxWidth: 1280, margin: "0 auto" }}>

            {/* ═══════════ OVERVIEW TAB (V1) ═══════════ */}
            {activeTab === "Overview" && (
              <>
                <SectionHeader title="Adoption & Engagement KPIs" subtitle={`Showing: ${selectedProduct}`} />
                <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
                  <KPITile label="Adoption Rate" value={`${adoptionPct}%`} trend={4.2} />
                  <KPITile label="MyAccount Users" value={totalUsers.toLocaleString()} trend={8.1} />
                  <KPITile label="New Accounts" value={newAccounts.toLocaleString()} trend={12.3} />
                  <KPITile label="Successful Logins" value={logins.toLocaleString()} trend={6.7} />
                  <KPITile label="Login Rate" value={`${loginRate}%`} trend={2.1} />
                  <KPITile label="Logins / User" value={loginsPerUser} trend={-0.8} />
                </div>

                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginTop: 24 }}>
                  <Card>
                    <h3 style={{ fontSize: 14, fontWeight: 700, color: COLORS.primary, margin: "0 0 16px" }}>Adoption Rate Over Time</h3>
                    <ResponsiveContainer width="100%" height={260}>
                      <LineChart data={trendData}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0" />
                        <XAxis dataKey="month" tick={{ fontSize: 12 }} />
                        <YAxis tick={{ fontSize: 12 }} unit="%" />
                        <Tooltip />
                        <Line type="monotone" dataKey="adoptionRate" stroke={PRODUCT_COLORS[selectedProduct]} strokeWidth={2.5} dot={{ r: 4 }} name="Adoption Rate %" />
                      </LineChart>
                    </ResponsiveContainer>
                  </Card>

                  <Card>
                    <h3 style={{ fontSize: 14, fontWeight: 700, color: COLORS.primary, margin: "0 0 16px" }}>MyAccount Users Over Time</h3>
                    <ResponsiveContainer width="100%" height={260}>
                      <BarChart data={trendData}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0" />
                        <XAxis dataKey="month" tick={{ fontSize: 12 }} />
                        <YAxis tick={{ fontSize: 12 }} />
                        <Tooltip />
                        <Bar dataKey="users" fill={PRODUCT_COLORS[selectedProduct]} radius={[4, 4, 0, 0]} name="Users" />
                      </BarChart>
                    </ResponsiveContainer>
                  </Card>
                </div>

                {selectedProduct === "All Products" && (
                  <Card style={{ marginTop: 20 }}>
                    <h3 style={{ fontSize: 14, fontWeight: 700, color: COLORS.primary, margin: "0 0 16px" }}>Adoption Rate by Product</h3>
                    <ResponsiveContainer width="100%" height={260}>
                      <BarChart data={PRODUCTS.filter(p => p !== "All Products").map(p => ({
                        product: p,
                        rate: +(15 + Math.random() * 25).toFixed(1),
                      }))} layout="vertical">
                        <CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0" />
                        <XAxis type="number" unit="%" tick={{ fontSize: 12 }} />
                        <YAxis type="category" dataKey="product" tick={{ fontSize: 12 }} width={90} />
                        <Tooltip />
                        <Bar dataKey="rate" radius={[0, 4, 4, 0]} name="Adoption Rate %">
                          {PRODUCTS.filter(p => p !== "All Products").map((p, i) => (
                            <Cell key={i} fill={PRODUCT_COLORS[p]} />
                          ))}
                        </Bar>
                      </BarChart>
                    </ResponsiveContainer>
                  </Card>
                )}
              </>
            )}

            {/* ═══════════ PAGE NAVIGATION TAB (V2 NEW) ═══════════ */}
            {activeTab === "Page Navigation" && (
              <>
                <SectionHeader title="Page Navigation Metrics" subtitle={`Showing: ${selectedProduct} — How users navigate MyAccount pages`} />
                <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
                  <KPITile label="Total Page Views" value={totalPageViews.toLocaleString()} trend={15.2} />
                  <KPITile label="Unique Visitors / Page" value={Math.round(totalPageViews * 0.55).toLocaleString()} subvalue="avg across pages" trend={9.4} />
                  <KPITile label="Most Visited Page" value={mostVisitedPage} />
                  <KPITile label="Avg Pages / Session" value={avgPagesPerSession} trend={3.1} />
                </div>

                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginTop: 24 }}>
                  <Card>
                    <h3 style={{ fontSize: 14, fontWeight: 700, color: COLORS.primary, margin: "0 0 16px" }}>Page Views by Page</h3>
                    <ResponsiveContainer width="100%" height={300}>
                      <BarChart data={pageViewData} layout="vertical">
                        <CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0" />
                        <XAxis type="number" tick={{ fontSize: 12 }} />
                        <YAxis type="category" dataKey="page" tick={{ fontSize: 11 }} width={120} />
                        <Tooltip />
                        <Bar dataKey="views" fill={PRODUCT_COLORS[selectedProduct]} radius={[0, 4, 4, 0]} name="Page Views" />
                      </BarChart>
                    </ResponsiveContainer>
                  </Card>

                  <Card>
                    <h3 style={{ fontSize: 14, fontWeight: 700, color: COLORS.primary, margin: "0 0 16px" }}>Unique Visitors by Page</h3>
                    <ResponsiveContainer width="100%" height={300}>
                      <BarChart data={pageViewData} layout="vertical">
                        <CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0" />
                        <XAxis type="number" tick={{ fontSize: 12 }} />
                        <YAxis type="category" dataKey="page" tick={{ fontSize: 11 }} width={120} />
                        <Tooltip />
                        <Bar dataKey="uniqueVisitors" fill="#27AE60" radius={[0, 4, 4, 0]} name="Unique Visitors" />
                      </BarChart>
                    </ResponsiveContainer>
                  </Card>
                </div>

                <Card style={{ marginTop: 20 }}>
                  <h3 style={{ fontSize: 14, fontWeight: 700, color: COLORS.primary, margin: "0 0 16px" }}>Page Views Over Time (by Page)</h3>
                  <ResponsiveContainer width="100%" height={300}>
                    <LineChart data={pageTrendData}>
                      <CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0" />
                      <XAxis dataKey="month" tick={{ fontSize: 12 }} />
                      <YAxis tick={{ fontSize: 12 }} />
                      <Tooltip />
                      <Legend wrapperStyle={{ fontSize: 11 }} />
                      <Line type="monotone" dataKey="Home" stroke="#1B3A5C" strokeWidth={2} dot={{ r: 3 }} />
                      <Line type="monotone" dataKey="Manage Products" stroke="#2E75B6" strokeWidth={2} dot={{ r: 3 }} />
                      <Line type="monotone" dataKey="Subscriptions" stroke="#27AE60" strokeWidth={2} dot={{ r: 3 }} />
                      <Line type="monotone" dataKey="Payment Info" stroke="#F39C12" strokeWidth={2} dot={{ r: 3 }} />
                      <Line type="monotone" dataKey="Manage Account" stroke="#9B59B6" strokeWidth={2} dot={{ r: 3 }} />
                      <Line type="monotone" dataKey="Security & Privacy" stroke="#E74C3C" strokeWidth={2} dot={{ r: 3 }} />
                    </LineChart>
                  </ResponsiveContainer>
                </Card>
              </>
            )}

            {/* ═══════════ USER ATTRIBUTION TAB (V2 NEW) ═══════════ */}
            {activeTab === "User Attribution" && (
              <>
                <SectionHeader title="User-Product Attribution" subtitle="Which products do MyAccount visitors own, and which product sent them here?" />
                <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
                  <KPITile label="Multi-Product Users" value="2,220" subvalue="own 2+ products" trend={11.3} />
                  <KPITile label="Multi-Product Rate" value="31.5%" subvalue="of all visitors" trend={5.8} />
                  <KPITile label="Top Referrer" value="Adaware" subvalue="2,840 sessions" />
                  <KPITile label="Total Sessions" value="8,260" trend={14.6} />
                </div>

                <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 20, marginTop: 24 }}>
                  <Card>
                    <h3 style={{ fontSize: 14, fontWeight: 700, color: COLORS.primary, margin: "0 0 16px" }}>Sessions by Referrer Product</h3>
                    <ResponsiveContainer width="100%" height={300}>
                      <BarChart data={referrerData}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0" />
                        <XAxis dataKey="product" tick={{ fontSize: 11 }} />
                        <YAxis tick={{ fontSize: 12 }} />
                        <Tooltip />
                        <Legend wrapperStyle={{ fontSize: 11 }} />
                        <Bar dataKey="home" stackId="a" fill="#1B3A5C" name="Home" />
                        <Bar dataKey="products" stackId="a" fill="#2E75B6" name="Products" />
                        <Bar dataKey="subscriptions" stackId="a" fill="#27AE60" name="Subscriptions" />
                        <Bar dataKey="billing" stackId="a" fill="#F39C12" name="Billing" />
                        <Bar dataKey="account" stackId="a" fill="#9B59B6" name="Account" />
                        <Bar dataKey="security" stackId="a" fill="#E74C3C" name="Security" radius={[4, 4, 0, 0]} />
                      </BarChart>
                    </ResponsiveContainer>
                  </Card>

                  <Card>
                    <h3 style={{ fontSize: 14, fontWeight: 700, color: COLORS.primary, margin: "0 0 16px" }}>Product Ownership Mix</h3>
                    <ResponsiveContainer width="100%" height={240}>
                      <PieChart>
                        <Pie data={multiProductData} cx="50%" cy="50%" innerRadius={55} outerRadius={85} dataKey="value" paddingAngle={3}>
                          {multiProductData.map((entry, i) => (
                            <Cell key={i} fill={entry.color} />
                          ))}
                        </Pie>
                        <Tooltip />
                      </PieChart>
                    </ResponsiveContainer>
                    <div style={{ display: "flex", justifyContent: "center", gap: 16, marginTop: 4 }}>
                      {multiProductData.map((d, i) => (
                        <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11, color: COLORS.text }}>
                          <div style={{ width: 10, height: 10, borderRadius: 2, background: d.color }} />
                          {d.name}
                        </div>
                      ))}
                    </div>
                  </Card>
                </div>

                {/* Product Summary Table */}
                <Card style={{ marginTop: 20 }}>
                  <h3 style={{ fontSize: 14, fontWeight: 700, color: COLORS.primary, margin: "0 0 16px" }}>Product Summary</h3>
                  <div style={{ overflowX: "auto" }}>
                    <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                      <thead>
                        <tr style={{ borderBottom: `2px solid ${COLORS.border}` }}>
                          {["Product", "Total Users", "Page Views", "Sessions", "Top Page", "Avg Pages/Session"].map((h) => (
                            <th key={h} style={{ textAlign: "left", padding: "10px 12px", color: COLORS.muted, fontWeight: 600, fontSize: 11, textTransform: "uppercase" }}>{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {[
                          { p: "Adaware", users: "2,840", views: "8,520", sess: "2,840", top: "Home", avg: "3.0" },
                          { p: "GameBuff", users: "1,920", views: "5,180", sess: "1,920", top: "Home", avg: "2.7" },
                          { p: "InPixio", users: "1,560", views: "4,120", sess: "1,560", top: "Products", avg: "2.6" },
                          { p: "CleanBuff", users: "980", views: "2,450", sess: "980", top: "Home", avg: "2.5" },
                          { p: "Soda PDF", users: "640", views: "1,680", sess: "640", top: "Subscriptions", avg: "2.6" },
                          { p: "PDF Suite", users: "320", views: "810", sess: "320", top: "Home", avg: "2.5" },
                        ].map((r, i) => (
                          <tr key={i} style={{ borderBottom: `1px solid ${COLORS.border}`, background: i % 2 === 1 ? "#F8FAFC" : "transparent" }}>
                            <td style={{ padding: "10px 12px", fontWeight: 600 }}>
                              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                <div style={{ width: 10, height: 10, borderRadius: 2, background: PRODUCT_COLORS[r.p] }} />
                                {r.p}
                              </div>
                            </td>
                            <td style={{ padding: "10px 12px" }}>{r.users}</td>
                            <td style={{ padding: "10px 12px" }}>{r.views}</td>
                            <td style={{ padding: "10px 12px" }}>{r.sess}</td>
                            <td style={{ padding: "10px 12px" }}>{r.top}</td>
                            <td style={{ padding: "10px 12px" }}>{r.avg}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </Card>

                {/* Attribution Drill-through Table */}
                <Card style={{ marginTop: 20 }}>
                  <h3 style={{ fontSize: 14, fontWeight: 700, color: COLORS.primary, margin: "0 0 4px" }}>User Attribution Detail</h3>
                  <p style={{ fontSize: 12, color: COLORS.muted, margin: "0 0 16px" }}>Drill-through: which user clicked what, from which product</p>
                  <div style={{ overflowX: "auto" }}>
                    <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                      <thead>
                        <tr style={{ borderBottom: `2px solid ${COLORS.border}` }}>
                          {["User ID", "Products Owned", "Referrer Product", "Pages Visited", "Date"].map((h) => (
                            <th key={h} style={{ textAlign: "left", padding: "10px 12px", color: COLORS.muted, fontWeight: 600, fontSize: 11, textTransform: "uppercase" }}>{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {attrTable.map((r, i) => (
                          <tr key={i} style={{ borderBottom: `1px solid ${COLORS.border}`, background: i % 2 === 1 ? "#F8FAFC" : "transparent" }}>
                            <td style={{ padding: "10px 12px", fontFamily: "monospace", fontSize: 12, color: COLORS.accent }}>{r.userId}</td>
                            <td style={{ padding: "10px 12px" }}>
                              <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                                {r.products.split(", ").map((p, j) => (
                                  <span key={j} style={{
                                    background: "#EFF6FF",
                                    color: COLORS.accent,
                                    padding: "2px 8px",
                                    borderRadius: 10,
                                    fontSize: 11,
                                    fontWeight: 600,
                                  }}>{p}</span>
                                ))}
                              </div>
                            </td>
                            <td style={{ padding: "10px 12px" }}>
                              <span style={{
                                background: PRODUCT_COLORS[r.referrer] ? `${PRODUCT_COLORS[r.referrer]}18` : "#F1F5F9",
                                color: PRODUCT_COLORS[r.referrer] || COLORS.text,
                                padding: "2px 8px",
                                borderRadius: 10,
                                fontSize: 11,
                                fontWeight: 600,
                              }}>{r.referrer}</span>
                            </td>
                            <td style={{ padding: "10px 12px", fontSize: 12 }}>{r.pages}</td>
                            <td style={{ padding: "10px 12px", color: COLORS.muted, fontSize: 12 }}>{r.date}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </Card>
              </>
            )}
          </div>

          {/* Footer */}
          <div style={{ textAlign: "center", padding: "24px 32px", color: COLORS.muted, fontSize: 12, borderTop: `1px solid ${COLORS.border}`, marginTop: 40 }}>
            MyAccount BI Dashboard V1 Prototype — Data shown is illustrative (mock data) — Prepared for stakeholder review
          </div>
        </div>
      );
    }

    // Render the app
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Dashboard />);
  </script>
</body>
</html>
