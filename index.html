<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyAccount BI Dashboard — V2 Prototype</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .tab-active { background: white; color: #2563eb; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .tab-inactive { color: #4b5563; }
    .tab-inactive:hover { color: #111827; }
    canvas { max-height: 280px; }
  </style>
</head>
<body class="bg-gray-50">
  <div class="min-h-screen p-6">
    <div class="max-w-7xl mx-auto">
      <!-- Header -->
      <div class="mb-6">
        <h1 class="text-2xl font-bold text-gray-900">MyAccount BI Dashboard</h1>
        <p class="text-sm text-gray-500">V2 Prototype — Feb 2026</p>
      </div>

      <!-- Tabs -->
      <div class="flex gap-1 mb-6 bg-gray-100 p-1 rounded-lg w-fit" id="tabs">
        <button onclick="switchTab('overview')" data-tab="overview" class="px-4 py-2 rounded-md text-sm font-medium transition-colors tab-active">Overview</button>
        <button onclick="switchTab('pages')" data-tab="pages" class="px-4 py-2 rounded-md text-sm font-medium transition-colors tab-inactive">Page Navigation</button>
        <button onclick="switchTab('attribution')" data-tab="attribution" class="px-4 py-2 rounded-md text-sm font-medium transition-colors tab-inactive">User Attribution</button>
        <button onclick="switchTab('conversions')" data-tab="conversions" class="px-4 py-2 rounded-md text-sm font-medium transition-colors tab-inactive flex items-center gap-2">Conversions <span class="bg-amber-400 text-amber-900 text-xs px-1.5 py-0.5 rounded font-semibold">NEW</span></button>
      </div>

      <!-- Filters -->
      <div class="flex gap-4 mb-6">
        <select id="productFilter" onchange="updateDashboard()" class="px-3 py-2 border rounded-lg bg-white text-sm">
          <option>All Products</option>
          <option>Adaware</option>
          <option>GameBuff</option>
          <option>InPixio</option>
          <option>CleanBuff</option>
        </select>
        <select id="periodFilter" class="px-3 py-2 border rounded-lg bg-white text-sm">
          <option>Monthly</option>
          <option>Weekly</option>
          <option>Daily</option>
        </select>
      </div>

      <!-- Tab Content -->
      <div id="tab-overview"></div>
      <div id="tab-pages" class="hidden"></div>
      <div id="tab-attribution" class="hidden"></div>
      <div id="tab-conversions" class="hidden"></div>
    </div>
  </div>

  <script>
    // ── Data ──
    const kpiData = {
      'All Products': { engagement: 14.0, activeUsers: 3480, newAccounts: 165, multiPage: 42.3, loginsPerUser: 1.8, totalHolders: 24857 },
      'Adaware': { engagement: 12.8, activeUsers: 1240, newAccounts: 52, multiPage: 38.5, loginsPerUser: 1.6, totalHolders: 9688 },
      'GameBuff': { engagement: 18.2, activeUsers: 980, newAccounts: 48, multiPage: 51.2, loginsPerUser: 2.1, totalHolders: 5385 },
      'InPixio': { engagement: 11.5, activeUsers: 720, newAccounts: 38, multiPage: 35.8, loginsPerUser: 1.5, totalHolders: 6261 },
      'CleanBuff': { engagement: 15.3, activeUsers: 540, newAccounts: 27, multiPage: 44.1, loginsPerUser: 1.9, totalHolders: 3523 }
    };
    const pageLabels = ['Home','Manage Products','Subscriptions','Payment Info','Manage Account','Security'];
    const pageViews = [4820, 2890, 2410, 1650, 1240, 680];
    const pageVisitors = [2610, 1740, 1392, 1044, 870, 522];
    const pageEngagement = [75, 50, 40, 30, 25, 15];
    const trendMonths = ['Sep','Oct','Nov','Dec','Jan','Feb'];
    const trendEngagement = [11.2, 12.1, 12.8, 13.2, 13.8, 14.0];
    const attrProducts = ['Adaware','GameBuff','InPixio','CleanBuff'];
    const attrSessions = [1580, 1240, 920, 680];
    const attrMulti = [185, 210, 95, 72];
    const attrTopPage = ['Subscriptions','Manage Products','Home','Payment Info'];
    const convPages = ['Subscriptions','Manage Products','Payment Info','Home'];
    const convRates = [2.8, 1.9, 1.4, 0.6];
    const funnelLabels = ['Page Visits','CTA Impressions','CTA Clicks','Purchases'];
    const funnelValues = [3480, 1856, 312, 42];
    const funnelColors = ['#3b82f6','#60a5fa','#93c5fd','#22c55e'];
    const srcLabels = ['Email Campaign','Desktop Notif','Web App','Organic'];
    const srcConversions = [22, 11, 6, 3];
    const srcData = [
      { source:'Email Campaign', sessions:1420, clicks:142, conversions:22, rate:'15.5%', revenue:'$892' },
      { source:'Desktop Notif', sessions:980, clicks:88, conversions:11, rate:'12.5%', revenue:'$445' },
      { source:'Web App', sessions:720, clicks:58, conversions:6, rate:'10.3%', revenue:'$398' },
      { source:'Organic', sessions:360, clicks:24, conversions:3, rate:'12.5%', revenue:'$230' }
    ];
    const revData = [
      { name:'Adaware', total:'$685', upsell:'$420', cross:'$265', value:685 },
      { name:'GameBuff', total:'$520', upsell:'$285', cross:'$235', value:520 },
      { name:'InPixio', total:'$445', upsell:'$310', cross:'$135', value:445 },
      { name:'CleanBuff', total:'$315', upsell:'$195', cross:'$120', value:315 }
    ];
    const COLORS = ['#3b82f6','#22c55e','#f59e0b','#ef4444','#8b5cf6'];

    // ── Helpers ──
    const charts = {};
    function kpiCard(title, value, subtitle, trend) {
      let trendHtml = '';
      if (trend) {
        const col = trend > 0 ? 'text-green-600' : 'text-red-600';
        const arrow = trend > 0
          ? '<svg class="w-3 h-3 mr-1 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>'
          : '<svg class="w-3 h-3 mr-1 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 17h8m0 0v-8m0 8l-8-8-4 4-6-6"/></svg>';
        trendHtml = `<div class="flex items-center text-xs mt-1 ${col}">${arrow}${Math.abs(trend)}% vs last month</div>`;
      }
      return `<div class="bg-white rounded-lg p-4 shadow-sm border">
        <div class="text-sm text-gray-500 mb-2">${title}</div>
        <div class="text-2xl font-bold text-gray-900">${value}</div>
        ${subtitle ? `<div class="text-xs text-gray-500 mt-1">${subtitle}</div>` : ''}
        ${trendHtml}
      </div>`;
    }

    function makeChart(id, cfg) {
      if (charts[id]) charts[id].destroy();
      const ctx = document.getElementById(id);
      if (!ctx) return;
      charts[id] = new Chart(ctx, cfg);
    }

    // ── Tab switching ──
    let currentTab = 'overview';
    function switchTab(tab) {
      document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
      document.getElementById('tab-' + tab).classList.remove('hidden');
      document.querySelectorAll('#tabs button').forEach(btn => {
        btn.classList.remove('tab-active');
        btn.classList.add('tab-inactive');
      });
      document.querySelector(`[data-tab="${tab}"]`).classList.remove('tab-inactive');
      document.querySelector(`[data-tab="${tab}"]`).classList.add('tab-active');
      currentTab = tab;
      renderTab(tab);
    }

    // ── Render functions ──
    function renderTab(tab) {
      const p = document.getElementById('productFilter').value;
      const d = kpiData[p];
      if (tab === 'overview') renderOverview(d);
      else if (tab === 'pages') renderPages();
      else if (tab === 'attribution') renderAttribution();
      else if (tab === 'conversions') renderConversions();
    }

    function updateDashboard() { renderTab(currentTab); }

    function renderOverview(d) {
      const el = document.getElementById('tab-overview');
      el.innerHTML = `
        <div class="space-y-6">
          <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
            ${kpiCard('Portal Engagement', d.engagement + '%', 'of ' + d.totalHolders.toLocaleString() + ' holders', 1.5)}
            ${kpiCard('Active Users', d.activeUsers.toLocaleString(), 'this month', 2.1)}
            ${kpiCard('New Accounts', d.newAccounts, 'this month', -3.2)}
            ${kpiCard('Multi-Page Rate', d.multiPage + '%', '2+ pages visited', 4.8)}
            ${kpiCard('Logins/User', d.loginsPerUser, 'avg this month')}
            ${kpiCard('Top Page', 'Home', '75% engagement')}
          </div>
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-white rounded-lg p-4 shadow-sm border">
              <h3 class="font-semibold mb-4">Portal Engagement Trend</h3>
              <canvas id="chartTrend"></canvas>
            </div>
            <div class="bg-white rounded-lg p-4 shadow-sm border">
              <h3 class="font-semibold mb-4">Page Engagement Rate</h3>
              <canvas id="chartPageEng"></canvas>
            </div>
          </div>
        </div>`;
      makeChart('chartTrend', {
        type: 'line',
        data: { labels: trendMonths, datasets: [{ label: 'Engagement %', data: trendEngagement, borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.1)', fill: true, tension: 0.3, pointRadius: 4 }] },
        options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { min: 0, max: 20, ticks: { callback: v => v + '%' } } } }
      });
      makeChart('chartPageEng', {
        type: 'bar',
        data: { labels: pageLabels, datasets: [{ label: 'Engagement %', data: pageEngagement, backgroundColor: '#3b82f6', borderRadius: 4 }] },
        options: { indexAxis: 'y', responsive: true, plugins: { legend: { display: false } }, scales: { x: { min: 0, max: 100, ticks: { callback: v => v + '%' } } } }
      });
    }

    function renderPages() {
      const el = document.getElementById('tab-pages');
      el.innerHTML = `
        <div class="space-y-6">
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            ${kpiCard('Total Page Views', '13,690', 'this month')}
            ${kpiCard('Unique Visitors', '3,480', 'distinct users')}
            ${kpiCard('Avg Pages/Session', '2.4', 'pages viewed')}
            ${kpiCard('Most Visited', 'Home', '4,820 views')}
          </div>
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-white rounded-lg p-4 shadow-sm border">
              <h3 class="font-semibold mb-4">Page Views by Page</h3>
              <canvas id="chartPageViews"></canvas>
            </div>
            <div class="bg-white rounded-lg p-4 shadow-sm border">
              <h3 class="font-semibold mb-4">Unique Visitors by Page</h3>
              <canvas id="chartVisitors"></canvas>
            </div>
          </div>
        </div>`;
      makeChart('chartPageViews', {
        type: 'bar',
        data: { labels: pageLabels, datasets: [{ label: 'Page Views', data: pageViews, backgroundColor: '#3b82f6', borderRadius: 4 }] },
        options: { indexAxis: 'y', responsive: true, plugins: { legend: { display: false } } }
      });
      makeChart('chartVisitors', {
        type: 'bar',
        data: { labels: pageLabels, datasets: [{ label: 'Unique Visitors', data: pageVisitors, backgroundColor: '#22c55e', borderRadius: 4 }] },
        options: { indexAxis: 'y', responsive: true, plugins: { legend: { display: false } } }
      });
    }

    function renderAttribution() {
      const el = document.getElementById('tab-attribution');
      const rows = attrProducts.map((p, i) => `<tr class="border-b last:border-0">
        <td class="py-2 px-3 font-medium">${p}</td>
        <td class="py-2 px-3 text-right">${attrSessions[i].toLocaleString()}</td>
        <td class="py-2 px-3 text-right">${attrMulti[i]}</td>
        <td class="py-2 px-3">${attrTopPage[i]}</td>
      </tr>`).join('');
      el.innerHTML = `
        <div class="space-y-6">
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            ${kpiCard('Multi-Product Users', '562', 'own 2+ products')}
            ${kpiCard('Multi-Product Rate', '16.2%', 'of all visitors')}
            ${kpiCard('Top Referrer', 'Adaware', '1,580 sessions')}
            ${kpiCard('Total Sessions', '4,420', 'this month')}
          </div>
          <div class="bg-white rounded-lg p-4 shadow-sm border">
            <h3 class="font-semibold mb-4">Sessions by Referrer Product</h3>
            <canvas id="chartAttrSessions"></canvas>
          </div>
          <div class="bg-white rounded-lg p-4 shadow-sm border overflow-x-auto">
            <h3 class="font-semibold mb-4">Attribution Detail</h3>
            <table class="w-full text-sm">
              <thead><tr class="border-b">
                <th class="text-left py-2 px-3">Product</th>
                <th class="text-right py-2 px-3">Sessions</th>
                <th class="text-right py-2 px-3">Multi-Product Users</th>
                <th class="text-left py-2 px-3">Top Page</th>
              </tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>`;
      makeChart('chartAttrSessions', {
        type: 'bar',
        data: { labels: attrProducts, datasets: [{ label: 'Sessions', data: attrSessions, backgroundColor: '#3b82f6', borderRadius: 4 }] },
        options: { responsive: true, plugins: { legend: { display: false } } }
      });
    }

    function renderConversions() {
      const el = document.getElementById('tab-conversions');
      const funnelBars = funnelValues.map((v, i) => {
        const pct = (v / funnelValues[0] * 100).toFixed(1);
        const dropoff = i > 0 ? ((funnelValues[i-1] - v) / funnelValues[i-1] * 100).toFixed(1) : null;
        return `<div>
          <div class="flex justify-between text-sm mb-1"><span>${funnelLabels[i]}</span><span class="font-medium">${v.toLocaleString()}</span></div>
          <div class="h-8 bg-gray-100 rounded overflow-hidden relative">
            <div class="h-full rounded" style="width:${pct}%;background:${funnelColors[i]}"></div>
            ${dropoff ? `<span class="absolute right-2 top-1/2 -translate-y-1/2 text-xs text-gray-500">-${dropoff}% dropoff</span>` : ''}
          </div>
        </div>`;
      }).join('');

      const srcRows = srcData.map((r, i) => `<tr class="border-b last:border-0">
        <td class="py-2 px-3 font-medium"><span class="w-3 h-3 rounded-full inline-block mr-2" style="background:${COLORS[i]}"></span>${r.source}</td>
        <td class="py-2 px-3 text-right">${r.sessions.toLocaleString()}</td>
        <td class="py-2 px-3 text-right">${r.clicks}</td>
        <td class="py-2 px-3 text-right">${r.conversions}</td>
        <td class="py-2 px-3 text-right">${r.rate}</td>
        <td class="py-2 px-3 text-right">${r.revenue}</td>
      </tr>`).join('');

      const revRows = revData.map((r, i) => `<tr class="border-b last:border-0">
        <td class="py-2 px-3 font-medium"><span class="w-3 h-3 rounded-full inline-block mr-2" style="background:${COLORS[i]}"></span>${r.name}</td>
        <td class="py-2 px-3 text-right font-medium">${r.total}</td>
        <td class="py-2 px-3 text-right text-green-600">${r.upsell}</td>
        <td class="py-2 px-3 text-right text-blue-600">${r.cross}</td>
      </tr>`).join('');

      el.innerHTML = `
        <div class="space-y-6">
          <div class="bg-amber-50 border border-amber-200 rounded-lg p-4 flex items-start gap-3">
            <svg class="w-5 h-5 text-amber-600 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
            <div>
              <p class="font-medium text-amber-800">Tracking Events Required</p>
              <p class="text-sm text-amber-700 mt-1">This tab shows placeholder data. To display real conversions, the tracking team needs to implement:
                <code class="bg-amber-100 px-1 rounded mx-1">cta_impression</code>,
                <code class="bg-amber-100 px-1 rounded mx-1">cta_click</code>,
                <code class="bg-amber-100 px-1 rounded mx-1">purchase_complete</code>, and
                <code class="bg-amber-100 px-1 rounded mx-1">traffic_source</code> events.</p>
            </div>
          </div>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            ${kpiCard('Conversion Rate', '13.5%', 'clicks → purchase', 2.3)}
            ${kpiCard('Revenue Influenced', '$1,965', 'this month', 8.4)}
            ${kpiCard('Upsells', '28', 'completed')}
            ${kpiCard('Cross-Sells', '14', 'completed')}
          </div>
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-white rounded-lg p-4 shadow-sm border">
              <h3 class="font-semibold mb-4">Conversion Funnel</h3>
              <div class="space-y-3">${funnelBars}</div>
            </div>
            <div class="bg-white rounded-lg p-4 shadow-sm border">
              <h3 class="font-semibold mb-4">Conversion Rate by Page</h3>
              <canvas id="chartConvRate"></canvas>
            </div>
          </div>
          <div class="bg-white rounded-lg p-4 shadow-sm border">
            <h3 class="font-semibold mb-4">Conversions by Traffic Source</h3>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
              <div class="lg:col-span-1"><canvas id="chartSrcPie"></canvas></div>
              <div class="lg:col-span-2 overflow-x-auto">
                <table class="w-full text-sm">
                  <thead><tr class="border-b">
                    <th class="text-left py-2 px-3">Source</th>
                    <th class="text-right py-2 px-3">Sessions</th>
                    <th class="text-right py-2 px-3">CTA Clicks</th>
                    <th class="text-right py-2 px-3">Conversions</th>
                    <th class="text-right py-2 px-3">Conv. Rate</th>
                    <th class="text-right py-2 px-3">Revenue</th>
                  </tr></thead>
                  <tbody>${srcRows}</tbody>
                </table>
              </div>
            </div>
          </div>
          <div class="bg-white rounded-lg p-4 shadow-sm border">
            <h3 class="font-semibold mb-4">Revenue by Product</h3>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
              <div class="lg:col-span-1"><canvas id="chartRevPie"></canvas></div>
              <div class="lg:col-span-2 overflow-x-auto">
                <table class="w-full text-sm">
                  <thead><tr class="border-b">
                    <th class="text-left py-2 px-3">Product</th>
                    <th class="text-right py-2 px-3">Total Revenue</th>
                    <th class="text-right py-2 px-3">Upsells</th>
                    <th class="text-right py-2 px-3">Cross-Sells</th>
                  </tr></thead>
                  <tbody>${revRows}</tbody>
                </table>
              </div>
            </div>
          </div>
        </div>`;
      makeChart('chartConvRate', {
        type: 'bar',
        data: { labels: convPages, datasets: [{ label: 'Conv. Rate %', data: convRates, backgroundColor: '#22c55e', borderRadius: 4 }] },
        options: { indexAxis: 'y', responsive: true, plugins: { legend: { display: false } }, scales: { x: { min: 0, max: 4, ticks: { callback: v => v + '%' } } } }
      });
      makeChart('chartSrcPie', {
        type: 'doughnut',
        data: { labels: srcLabels, datasets: [{ data: srcConversions, backgroundColor: COLORS }] },
        options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12 } } } }
      });
      makeChart('chartRevPie', {
        type: 'doughnut',
        data: { labels: revData.map(r => r.name), datasets: [{ data: revData.map(r => r.value), backgroundColor: COLORS }] },
        options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12 } }, tooltip: { callbacks: { label: ctx => ' $' + ctx.parsed } } } }
      });
    }

    // ── Init ──
    renderOverview(kpiData['All Products']);
  </script>
</body>
</html>
